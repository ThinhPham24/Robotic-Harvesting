unity_bridge:
  ros__parameters:
    world_frame: world
    scene_topic: /harvest/perception/scene_entities
    point_cloud_topic: /harvest/perception/scene_cloud
    twin_namespace: /harvest/twin
    stale_entity_timeout_sec: 1.0
